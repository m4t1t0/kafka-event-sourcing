services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/localhost/29092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Waiting for Kafka...' &&
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic clients &&
      kafka-topics --create --if-not-exists --bootstrap-server kafka:29092 --partitions 3 --replication-factor 1 --topic orders &&
      echo 'Topics created.'
      "
    environment:
      KAFKA_BROKER_ID: ignored
      KAFKA_ZOOKEEPER_CONNECT: ignored

  ksqldb:
    image: confluentinc/cp-ksqldb-server:7.5.0
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8088:8088"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8088/info || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    environment:
      KSQL_BOOTSTRAP_SERVERS: kafka:29092
      KSQL_LISTENERS: http://0.0.0.0:8088
      KSQL_KSQL_SERVICE_ID: kafka-event-sourcing
      KSQL_KSQL_LOGGING_PROCESSING_STREAM_AUTO_CREATE: "true"
      KSQL_KSQL_LOGGING_PROCESSING_TOPIC_AUTO_CREATE: "true"
      KSQL_KSQL_HIDDEN_TOPICS: "^_confluent.*"
      KSQL_KSQL_INTERNAL_TOPIC_REPLICAS: 1
      KSQL_KSQL_SINK_REPLICAS: 1
      KSQL_KSQL_STREAMS_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  client-service:
    build:
      context: .
      args:
        SERVICE: client-service
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8081:8081"
    environment:
      KAFKA_BROKER: kafka:29092
      POSTGRES_DSN: "host=postgres user=postgres password=postgres dbname=projections port=5432 sslmode=disable"
      HTTP_ADDR: ":8081"

  order-service:
    build:
      context: .
      args:
        SERVICE: order-service
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8082:8082"
    environment:
      KAFKA_BROKER: kafka:29092
      POSTGRES_DSN: "host=postgres user=postgres password=postgres dbname=projections port=5432 sslmode=disable"
      HTTP_ADDR: ":8082"

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: projections
    volumes:
      - pgdata:/var/lib/postgresql/data

  # --- Dev services (hot reload) ---

  dev-client-service:
    profiles: [dev]
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8081:8081"
    environment:
      KAFKA_BROKER: kafka:29092
      POSTGRES_DSN: "host=postgres user=postgres password=postgres dbname=projections port=5432 sslmode=disable"
      HTTP_ADDR: ":8081"
    command: ["-c", ".air.client.docker.toml"]

  dev-order-service:
    profiles: [dev]
    build:
      context: .
      dockerfile: Dockerfile.dev
    volumes:
      - .:/app
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8082:8082"
    environment:
      KAFKA_BROKER: kafka:29092
      POSTGRES_DSN: "host=postgres user=postgres password=postgres dbname=projections port=5432 sslmode=disable"
      HTTP_ADDR: ":8082"
    command: ["-c", ".air.order.docker.toml"]

  # --- Tool services ---

  migrate:
    profiles: [tools]
    image: migrate/migrate:v4.17.0
    volumes:
      - ./migrations:/migrations
    network_mode: "service:postgres"

volumes:
  pgdata:
